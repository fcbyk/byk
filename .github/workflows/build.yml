name: Build Binaries

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            artifact: linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04-arm
            artifact: linux-arm64
          - target: aarch64-apple-darwin
            os: macos-14
            artifact: darwin-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-2022
            artifact: windows-x64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Add Intel macOS target
        if: runner.os == 'macOS'
        run: rustup target add x86_64-apple-darwin

      - name: Install cross-compilation linker (Linux ARM)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/byk.exe dist/

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/byk dist/

      - name: Create archive (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd dist
          tar czf ../byk-${{ matrix.artifact }}.tar.gz byk
          cd ..

      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd dist
          7z a ../byk-${{ matrix.artifact }}.zip byk.exe
          cd ..

      - name: Build (Intel macOS)
        if: runner.os == 'macOS'
        run: cargo build --release --target x86_64-apple-darwin

      - name: Archive (Intel macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          cp target/x86_64-apple-darwin/release/byk dist/byk
          cd dist
          tar czf ../byk-darwin-x86_64.tar.gz byk
          cd ..

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: byk-${{ matrix.artifact }}
          path: |
            byk-*.tar.gz
            byk-*.zip

  release:
    name: Create Draft Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: assets

      - name: Flatten assets
        run: find assets -type f -exec mv {} . \;

      - name: Generate checksums
        run: shasum -a 256 byk-*.tar.gz byk-*.zip > checksums.txt

      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            byk-*.tar.gz
            byk-*.zip
            checksums.txt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
